name: Lighthouse CI

on:
  pull_request:
    branches:
      - main

jobs:
  audit:
    name: Build & Test Performance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          CF_WEB_ANALYTICS_TOKEN: ${{ secrets.CF_WEB_ANALYTICS_TOKEN }}
          TYPEFORM_FORM_ID: ${{ secrets.TYPEFORM_FORM_ID }}

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli puppeteer
          npm run lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
